<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin Panel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container-fluid">
    <div class="row min-vh-100">
      <aside class="col-12 col-md-3 col-lg-2 bg-dark text-white p-3">
        <h4 class="mb-4">Admin Panel</h4>
        <ul class="nav flex-column gap-1">
          <li class="nav-item"><a class="nav-link text-white" href="/admin/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/users">Users</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/listings">Listings</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/reports">Reports</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/payments">Payments</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/promotions">Promotions</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/categories">Categories</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/admin/audit-logs">Audit Logs</a></li>
          <li class="nav-item mt-3"><a class="nav-link text-warning" href="/admin/logout">Logout</a></li>
        </ul>
      </aside>
      <main class="col-12 col-md-9 col-lg-10 p-4">
        {% if request.query_params.get('msg') %}
          <div class="alert alert-info">{{ request.query_params.get('msg') }}</div>
        {% endif %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
