{% extends 'admin/base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}
<h2 class="mb-3">Categories</h2>
<div class="table-responsive">
<table class="table table-striped table-bordered">
  <thead><tr><th>ID</th><th>Name</th><th>Slug</th><th>Active</th><th>Order</th><th>Created</th></tr></thead>
  <tbody>
    {% for c in items %}
    <tr>
      <td>{{ c.id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.slug }}</td>
      <td>{{ c.is_active }}</td>
      <td>{{ c.display_order }}</td>
      <td>{{ c.created_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
